server:
  port: 8761

spring:
  profiles:
    active: local
  application:
    name: discovery-server
  # Active profile is set via:
  #   Local → IDE run config or: java -jar ... --spring.profiles.active=local
  #   Docker → SPRING_PROFILES_ACTIVE env var in docker-compose.yml

eureka:
  instance:
    prefer-ip-address: false
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    eviction-interval-timer-in-ms: 10000

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
