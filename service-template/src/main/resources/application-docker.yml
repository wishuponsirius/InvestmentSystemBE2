# ── Profile: docker ───────────────────────────────────────────────────────────
# All services connect to the same RDS instance and database.
# Set DB_HOST, DB_NAME, DB_USERNAME, DB_PASSWORD in your .env or EC2 environment.

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@discovery-server:8761/eureka/
    registry-fetch-interval-seconds: 5

logging:
  level:
    com.microservices: INFO
