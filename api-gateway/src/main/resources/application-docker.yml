# ── Profile: docker ───────────────────────────────────────────────────────────
# Activated automatically via SPRING_PROFILES_ACTIVE=docker in docker-compose.yml
# Uses Docker service name 'discovery-server' instead of localhost

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@discovery-server:8761/eureka/
    registry-fetch-interval-seconds: 5

jwt:
  secret: ${JWT_SECRET}

spring:
  cloud:
    gateway:
      routes:
        - id: iam-service
          uri: lb://iam-service
          predicates:
            - Path=/auth/**

        - id: iam-service-admin
          uri: lb://iam-service
          predicates:
            - Path=/admin/**

        - id: iam-service-account
          uri: lb://iam-service
          predicates:
            - Path=/me/**

        - id: ingestion-service
          uri: http://ingestion-service:8000
          predicates:
            - Path=/ingest/**         

        # Swagger aggregation — forwards /v3/api-docs/{service} to each service
        - id: iam-service-docs
          uri: lb://iam-service
          predicates:
            - Path=/v3/api-docs/iam-service
          filters:
            - RewritePath=/v3/api-docs/iam-service, /v3/api-docs
        # ── Ingestion Swagger ───────────────────
        - id: ingestion-service-docs
          uri: http://ingestion-service:8000
          predicates:
            - Path=/v3/api-docs/ingestion-service
          filters:
            - RewritePath=/v3/api-docs/ingestion-service, /openapi.json  
            
        # ── Add more routes here as you add services ───────────────────────
        # - id: market-price-service
        #   uri: lb://market-price-service
        #   predicates:
        #     - Path=/api/prices/**
        #
        # - id: market-price-service-docs
        #   uri: lb://market-price-service
        #   predicates:
        #     - Path=/v3/api-docs/market-price-service
        #   filters:
        #     - RewritePath=/v3/api-docs/market-price-service, /v3/api-docs

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.microservices: INFO
