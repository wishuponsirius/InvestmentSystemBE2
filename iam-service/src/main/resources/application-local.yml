# ── Profile: local ────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/investment_db
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 5

  mail:
    username: {GMAIL_USERNAME}   # set in your IDE environment variables
    password: {GMAIL_APP_PASSWORD}  # Gmail App Password (not your real password)

  jpa:
    show-sql: true

app:
  base-url: http://localhost:8081

springdoc:
  server-url: http://localhost:8080

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-chars-long}

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/

logging:
  level:
    com.microservices: DEBUG
    org.hibernate.SQL: DEBUG
